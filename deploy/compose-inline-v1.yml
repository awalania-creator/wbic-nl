services:
  wbic-web:
    image: nginx:alpine
    restart: always
    command:
      - /bin/sh
      - -c
      - |
        set -e
        CB=$$(date +%s)
        cd /usr/share/nginx/html
        wget -O index.html "https://raw.githubusercontent.com/awalania-creator/wbic-nl/main/index.html?cb=$$CB"
        wget -O diensten.html "https://raw.githubusercontent.com/awalania-creator/wbic-nl/main/diensten.html?cb=$$CB"
        wget -O contact.html "https://raw.githubusercontent.com/awalania-creator/wbic-nl/main/contact.html?cb=$$CB"
        wget -O algemene-voorwaarden.html "https://raw.githubusercontent.com/awalania-creator/wbic-nl/main/algemene-voorwaarden.html?cb=$$CB"
        wget -O styles.css "https://raw.githubusercontent.com/awalania-creator/wbic-nl/main/styles.css?cb=$$CB"
        mkdir -p assets/clients
        for name in gemeente-almere hilversum-mediastad veiligheidsregio-haaglanden centric; do
          wget -O "assets/clients/$${name}.src" "https://raw.githubusercontent.com/awalania-creator/wbic-nl/main/assets/clients/$${name}.png.b64?cb=$$CB" || continue
          tr -d ' \t\r\n' < "assets/clients/$${name}.src" > "assets/clients/$${name}.clean"
          magic=$$(head -c 8 "assets/clients/$${name}.clean" 2>/dev/null | od -An -tx1 | tr -d ' \n' || true)
          if [ "$$magic" = "89504e470d0a1a0a" ]; then
            mv "assets/clients/$${name}.clean" "assets/clients/$${name}.png"
          else
            base64 -d "assets/clients/$${name}.clean" > "assets/clients/$${name}.png" 2>/dev/null || true
          fi
          rm -f "assets/clients/$${name}.src" "assets/clients/$${name}.clean"
        done
        printf '%s' "" | base64 -d > assets/clients/gemeente-apeldoorn.png
        printf '%s' "" | base64 -d > assets/clients/gemeente-deurne.png
        ls -la assets/clients/
        nginx -g 'daemon off;'
    labels:
      - traefik.enable=true
      - "traefik.http.routers.wbic.rule=Host(`wbic.aiwbic.cloud`)"
      - traefik.http.routers.wbic.tls=true
      - traefik.http.routers.wbic.entrypoints=web,websecure
      - traefik.http.routers.wbic.tls.certresolver=mytlschallenge
      - traefik.http.services.wbic.loadbalancer.server.port=80
    networks:
      - n8n_default

  wbic-api:
    build: ./backend
    restart: always
    environment:
      - PORT=3000
      - TURNSTILE_SECRET=$${TURNSTILE_SECRET:-}
      - CLOUDFLARE_TURNSTILE_SECRET=$${TURNSTILE_SECRET:-}
      - SMTP_HOST=$${SMTP_HOST:-}
      - SMTP_PORT=$${SMTP_PORT:-587}
      - SMTP_FROM=$${SMTP_FROM:-info@wbic.nl}
      - ALLOWED_ORIGINS=$${ALLOWED_ORIGINS:-https://wbic.aiwbic.cloud}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.wbic-api.rule=Host(`wbic.aiwbic.cloud`) && PathPrefix(`/api`)"
      - traefik.http.routers.wbic-api.entrypoints=websecure
      - traefik.http.routers.wbic-api.tls=true
      - traefik.http.routers.wbic-api.tls.certresolver=mytlschallenge
      - traefik.http.services.wbic-api.loadbalancer.server.port=3000
    networks:
      - n8n_default

networks:
  n8n_default:
    external: true
