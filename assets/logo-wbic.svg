<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 370" role="img" aria-label="WBIC advies en realisatie">
  <title>WBIC</title>
  <!-- Beige field -->
  <rect x="0" y="0" width="310" height="270" fill="#C9B48E"/>
  <!-- Orange vertical accent bar -->
  <rect x="310" y="0" width="30" height="270" fill="#E85423"/>
  <!-- Black baseline bar -->
  <rect x="0" y="270" width="340" height="100" fill="#141413"/>
  <!-- wbic wordmark, straddling beige/black boundary -->
  <text x="12" y="300"
        font-family="'Quicksand','Helvetica Neue',Arial,sans-serif"
        font-weight="700"
        font-size="140"
        fill="#FFFFFF"
        letter-spacing="-3">wbic</text>
  <!-- Orange '&' accent on the black bar -->
  <text x="150" y="345"
        font-family="'Quicksand','Helvetica Neue',Arial,sans-serif"
        font-weight="400"
        font-size="30"
        fill="#E85423">&amp;</text>
</svg>
