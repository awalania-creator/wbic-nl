name: Deploy WBIC

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-wbic
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, inkoopkompas]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      - name: Pre-deploy disk snapshot
        run: |
          echo ">>> Disk usage BEFORE deploy:"
          df -h / | tail -1 | awk '{printf "  Total: %s | Used: %s (%s) | Free: %s\n", $2, $3, $5, $4}'

      - name: Sync repo into /docker/wbic-nl/
        run: |
          set -eo pipefail
          TARGET=/docker/wbic-nl
          mkdir -p "$TARGET/backend" "$TARGET/html" "$TARGET/web-assets/clients"

          # Preserve any existing .env on the VPS (TURNSTILE_SECRET, SMTP_*, etc.)
          if [ -f "$TARGET/.env" ]; then
            cp "$TARGET/.env" /tmp/wbic-env.bak
          fi

          # Sync compose + backend code (rsync excludes node_modules + .git)
          install -m 0644 docker-compose.yml "$TARGET/docker-compose.yml"
          rsync -a --delete \
            --exclude='node_modules' \
            --exclude='.git' \
            backend/ "$TARGET/backend/"

          # Restore .env if it existed
          if [ -f /tmp/wbic-env.bak ]; then
            cp /tmp/wbic-env.bak "$TARGET/.env"
            rm /tmp/wbic-env.bak
          fi

          echo ">>> Files synced to $TARGET"
          ls -la "$TARGET"
          ls -la "$TARGET/backend"

      - name: Stage root HTML + CSS into /docker/wbic-nl/html
        run: |
          set -eo pipefail
          DEST=/docker/wbic-nl/html
          mkdir -p "$DEST"
          staged=0
          for f in index.html diensten.html contact.html algemene-voorwaarden.html styles.css; do
            if [ -f "$f" ]; then
              install -m 0644 "$f" "$DEST/$f"
              echo "  [HTML] $f -> $DEST/$f ($(stat -c%s "$DEST/$f") bytes)"
              staged=$((staged+1))
            else
              echo "  WARN: $f missing in repo root"
            fi
          done
          if [ "$staged" -eq 0 ]; then
            echo "FATAL: no HTML/CSS staged — aborting deploy to avoid serving blank site"
            exit 1
          fi
          echo ">>> $DEST contents:"
          ls -la "$DEST"

      - name: Stage logo assets (auto-detect PNG vs base64)
        run: |
          set -eo pipefail
          DEST=/docker/wbic-nl/web-assets/clients
          mkdir -p "$DEST"

          shopt -s nullglob
          for src in assets/clients/*.png.b64 assets/clients/*.png; do
            [ -f "$src" ] || continue
            base=$(basename "$src")
            case "$base" in
              *.png.b64) out="$DEST/${base%.b64}" ;;
              *.png)     out="$DEST/$base" ;;
              *)         continue ;;
            esac

            magic=$(head -c 8 "$src" 2>/dev/null | od -An -tx1 | tr -d ' \n' || true)
            if [ "$magic" = "89504e470d0a1a0a" ]; then
              echo "  [REAL PNG]   $src -> $out"
              cp "$src" "$out"
            else
              echo "  [BASE64?]    $src -> decoding to $out"
              if base64 -d "$src" > "$out.tmp" 2>/dev/null; then
                magic2=$(head -c 8 "$out.tmp" 2>/dev/null | od -An -tx1 | tr -d ' \n' || true)
                if [ "$magic2" = "89504e470d0a1a0a" ]; then
                  mv "$out.tmp" "$out"
                  echo "    -> decoded OK"
                else
                  echo "    -> decoded but not a PNG (magic=$magic2). Aborting."
                  rm -f "$out.tmp"
                  exit 1
                fi
              else
                echo "    -> base64 decode failed. Aborting."
                rm -f "$out.tmp"
                exit 1
              fi
            fi
          done

          echo ">>> Staged logo assets in $DEST:"
          ls -la "$DEST"
        working-directory: ${{ github.workspace }}

      - name: Stage SVG brand assets
        run: |
          set -eo pipefail
          DEST=/docker/wbic-nl/web-assets
          mkdir -p "$DEST"

          shopt -s nullglob
          staged=0
          for src in assets/*.svg; do
            [ -f "$src" ] || continue
            base=$(basename "$src")
            install -m 0644 "$src" "$DEST/$base"
            echo "  [SVG] $src -> $DEST/$base ($(stat -c%s "$DEST/$base") bytes)"
            staged=$((staged+1))
          done
          if [ "$staged" -eq 0 ]; then
            echo "  WARN: no SVGs found under assets/*.svg"
          fi

          echo ">>> web-assets contents:"
          ls -la "$DEST"
        working-directory: ${{ github.workspace }}

      - name: Build + restart wbic-nl (no downtime window)
        working-directory: /docker/wbic-nl
        run: |
          set -eo pipefail
          echo ">>> Building wbic-api image..."
          docker compose build wbic-api

          echo ">>> Applying stack (force-recreate, remove orphans)..."
          # NB: no explicit 'down' — if anything above fails, old containers keep serving.
          docker compose up -d --force-recreate --remove-orphans

      - name: Health check
        if: always()
        run: |
          sleep 8
          echo ">>> Container status:"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E '(wbic|NAMES)' || true
          echo ""
          WEB=$(docker ps --format '{{.Names}}' | grep wbic-web | head -1)
          if [ -n "$WEB" ]; then
            echo ">>> /usr/share/nginx/html in $WEB:"
            docker exec "$WEB" ls -la /usr/share/nginx/html 2>/dev/null || echo "  (could not list)"
            echo ""
            echo ">>> logo-wbic.svg served by nginx (internal wget):"
            docker exec "$WEB" sh -c 'wget -qO- --server-response http://127.0.0.1/assets/logo-wbic.svg 2>&1 | head -5' || echo "  (wget failed)"
            echo ""
            echo ">>> index.html served by nginx (internal wget):"
            docker exec "$WEB" sh -c 'wget -qO- --server-response http://127.0.0.1/ 2>&1 | head -5' || echo "  (wget failed)"
          fi
          echo ""
          echo ">>> Disk usage AFTER deploy:"
          df -h / | tail -1 | awk '{printf "  Total: %s | Used: %s (%s) | Free: %s\n", $2, $3, $5, $4}'

      - name: Docker cleanup (light)
        if: always()
        run: |
          docker container prune -f 2>/dev/null || true
          docker image prune -f --filter "until=24h" 2>/dev/null || true
          docker builder prune -f --filter "until=24h" 2>/dev/null || true
          echo ">>> Cleanup complete"
