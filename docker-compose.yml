services:
  wbic-web:
    image: nginx:alpine
    restart: always
    volumes:
      - /docker/wbic-nl/web-assets:/usr/share/nginx/html/assets:ro
      - /docker/wbic-nl/html:/srv/html:ro
    command:
      - /bin/sh
      - -c
      - |
        set -e
        echo "[wbic-web] seeding HTML from /srv/html"
        if ls /srv/html/*.html >/dev/null 2>&1; then
          cp /srv/html/*.html /usr/share/nginx/html/
        else
          echo "[wbic-web] WARN: no HTML files in /srv/html (check deploy.yml Stage HTML step)"
        fi
        if [ -f /srv/html/styles.css ]; then
          cp /srv/html/styles.css /usr/share/nginx/html/styles.css
        fi
        ls -la /usr/share/nginx/html
        exec nginx -g 'daemon off;'
    labels:
      - traefik.enable=true
      - "traefik.http.routers.wbic.rule=Host(`wbic.nl`) || Host(`www.wbic.nl`)"
      - traefik.http.routers.wbic.tls=true
      - traefik.http.routers.wbic.entrypoints=web,websecure
      - traefik.http.routers.wbic.tls.certresolver=mytlschallenge
      - traefik.http.services.wbic.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - n8n_default

  wbic-api:
    build: ./backend
    restart: always
    # NOTE: Set deze env vars handmatig op de VPS in /docker/wbic-nl/.env:
    #   TURNSTILE_SECRET=...
    #   SMTP_HOST=smtp.example.com
    #   SMTP_PORT=587
    #   SMTP_FROM=info@wbic.nl
    #   ALLOWED_ORIGINS=https://wbic.nl,https://www.wbic.nl
    environment:
      - PORT=3000
      - TURNSTILE_SECRET=${TURNSTILE_SECRET:-}
      - CLOUDFLARE_TURNSTILE_SECRET=${TURNSTILE_SECRET:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_FROM=${SMTP_FROM:-info@wbic.nl}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://wbic.nl,https://www.wbic.nl}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.wbic-api.rule=(Host(`wbic.nl`) || Host(`www.wbic.nl`)) && PathPrefix(`/api`)"
      - traefik.http.routers.wbic-api.entrypoints=websecure
      - traefik.http.routers.wbic-api.tls=true
      - traefik.http.routers.wbic-api.tls.certresolver=mytlschallenge
      - traefik.http.services.wbic-api.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - n8n_default

networks:
  n8n_default:
    external: true
